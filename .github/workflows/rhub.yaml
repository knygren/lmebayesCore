# R-hub's generic GitHub Actions workflow file. It's canonical location is at
# https://github.com/r-hub/actions/blob/v1/workflows/rhub.yaml
# You can update this file to a newer version using the rhub2 package:
#
# rhub::rhub_setup()
#
# It is unlikely that you need to modify this file manually.

name: R-hub
run-name: "${{ github.event.inputs.id }}: ${{ github.event.inputs.name || format('Manually run by {0}', github.triggering_actor) }}"

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'A comma separated list of R-hub platforms to use.'
        type: string
        default: 'linux,windows,macos'
      name:
        description: 'Run name. You can leave this empty now.'
        type: string
      id:
        description: 'Unique ID. You can leave this empty now.'
        type: string

jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      containers: ${{ steps.rhub-setup.outputs.containers }}
      platforms: ${{ steps.rhub-setup.outputs.platforms }}

    steps:
    # NO NEED TO CHECKOUT HERE
    - uses: r-hub/actions/setup@v1
      with:
        config: ${{ github.event.inputs.config }}
      id: rhub-setup

  linux-containers:
    needs: setup
    if: ${{ needs.setup.outputs.containers != '[]' }}
    runs-on: ubuntu-latest
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.containers) }}
    container:
      image: ${{ matrix.config.container }}

    steps:
      - uses: r-hub/actions/checkout@v1

      # Workaround for: AddressSanitizer ODR-violation between libtbb.so and libtbbmalloc.so
      # (Intel TBB / RcppParallel). ASan hint: ASAN_OPTIONS=detect_odr_violation=0
      # Must be set before setup-deps so loading R during pak install does not abort.
      - name: ASan suppress TBB ODR false positive (clang-asan / gcc-asan)
        if: ${{ matrix.config.label == 'clang-asan' || matrix.config.label == 'gcc-asan' }}
        run: echo "ASAN_OPTIONS=detect_odr_violation=0" >> "$GITHUB_ENV"

      - uses: r-hub/actions/platform-info@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - uses: r-hub/actions/setup-deps@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}

      # Workaround for: lazy-load fails loading RcppArmadillo.so — libquadmath.so.0 not found.
      # Intel platform uses a Fedora container; RcppArmadillo (via gfortran/quadmath) needs the
      # libquadmath runtime package on the image. Not a glmbayes R code issue.
      - name: Install libquadmath (Fedora / Intel container)
        if: ${{ matrix.config.label == 'intel' }}
        run: |
          set -eux
          if command -v dnf >/dev/null 2>&1; then
            dnf install -y libquadmath
          elif command -v microdnf >/dev/null 2>&1; then
            microdnf install -y libquadmath
          else
            echo "Expected dnf or microdnf on this image" >&2
            exit 1
          fi

      # Workaround for: R_NamespaceRegistry compilation failure on R-devel.
      # Seen on: valgrind, nosuggests.
      - name: Diagnostics (R / Rcpp)
        if: ${{ matrix.config.label == 'valgrind' || matrix.config.label == 'nosuggests' }}
        run: |
          Rscript -e "cat('R:', R.version.string, '\n')"
          Rscript -e "if (requireNamespace('Rcpp', quietly=TRUE)) cat('Rcpp:', as.character(packageVersion('Rcpp')), '\n') else cat('Rcpp: <not installed>\\n')"

      # Option 1: CRAN source — no GitHub PAT / remotes::install_github (avoids HTTP 401 on rhub).
      - name: Force reinstall Rcpp from CRAN (source) for R-devel
        if: ${{ matrix.config.label == 'valgrind' || matrix.config.label == 'nosuggests' }}
        run: |
          Rscript -e "install.packages('Rcpp', repos='https://cloud.r-project.org', type='source')"
      - uses: r-hub/actions/run-check@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}

      # On install ERROR, R points to check/*/00install.out — upload so you can download from the Actions UI.
      - name: Upload R CMD check logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rhub-check-${{ matrix.config.label }}
          if-no-files-found: warn
          path: |
            check/**/00install.out
            check/**/00check.log

  other-platforms:
    needs: setup
    if: ${{ needs.setup.outputs.platforms != '[]' }}
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.platforms) }}

    steps:
      - uses: r-hub/actions/checkout@v1
      - uses: r-hub/actions/setup-r@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}
      - uses: r-hub/actions/platform-info@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - uses: r-hub/actions/setup-deps@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}

      # Workaround for: R_NamespaceRegistry compilation failure on Windows R-devel.
      # (This keeps the workaround scoped; other platforms still use CRAN binaries.)
      - name: Diagnostics (R / Rcpp)
        if: ${{ matrix.config.label == 'windows' }}
        shell: bash
        run: |
          Rscript -e "cat('R:', R.version.string, '\n')"
          Rscript -e "if (requireNamespace('Rcpp', quietly=TRUE)) cat('Rcpp:', as.character(packageVersion('Rcpp')), '\n') else cat('Rcpp: <not installed>\\n')"

      # Option 1: CRAN source — no GitHub PAT / remotes::install_github (avoids HTTP 401 on rhub).
      - name: Force reinstall Rcpp from CRAN (source) for R-devel
        if: ${{ matrix.config.label == 'windows' }}
        shell: bash
        run: |
          Rscript -e "install.packages('Rcpp', repos='https://cloud.r-project.org', type='source')"

      # Workaround for: ubuntu-next vignette build fails loading rlang.so
      # Error: undefined symbol: SETLENGTH (rlang.so built for wrong R / stale binary in user lib).
      # setup-deps may install a bad rlang first — remove then install.packages(type='source').
      - name: Force rebuild vignette toolchain from source (ubuntu-next)
        if: ${{ matrix.config.label == 'ubuntu-next' }}
        shell: bash
        run: |
          Rscript -e "cat('R:', R.version.string, '\n')"
          Rscript -e 'user_lib <- Sys.getenv("R_LIBS_USER"); if (!nzchar(user_lib)) user_lib <- .libPaths()[1L]; message("Rebuilding rlang stack in: ", user_lib); pkgs <- c("rmarkdown","knitr","yaml","xfun","lifecycle","vctrs","glue","cli","rlang"); ip <- rownames(installed.packages(lib.loc = user_lib, noCache = TRUE)); for (p in pkgs) if (p %in% ip) remove.packages(p, lib = user_lib); install.packages(rev(pkgs), lib = user_lib, repos = "https://cloud.r-project.org", type = "source", Ncpus = 2L)'
      - uses: r-hub/actions/run-check@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}

      # On install ERROR, R points to check/*/00install.out — upload so you can download from the Actions UI.
      - name: Upload R CMD check logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rhub-check-${{ matrix.config.label }}
          if-no-files-found: warn
          path: |
            check/**/00install.out
            check/**/00check.log
